# SharkAuth Configuration — BuildersMTY Production
#
# Values with ${VAR_NAME} are resolved from environment variables.
# Environment variable overrides use SHARKAUTH_ prefix with double-underscore
# for nesting: SHARKAUTH_SMTP__FROM_NAME overrides smtp.from_name
#
# Single-level keys: SHARKAUTH_SMTP__HOST, SHARKAUTH_SMTP__PORT, SHARKAUTH_SMTP__PASSWORD
# Multi-word keys:   SHARKAUTH_SERVER__BASE_URL, SHARKAUTH_AUTH__SESSION_LIFETIME

server:
  port: 8080
  secret: "${SHARKAUTH_SECRET}"
  base_url: "https://auth.buildersmty.com.mx"
  cors_origins: []

storage:
  path: "./data/sharkauth.db"

auth:
  session_lifetime: "30d"
  password_min_length: 8

passkeys:
  rp_name: "BuildersMTY"
  rp_id: "auth.buildersmty.com.mx"
  origin: "https://auth.buildersmty.com.mx"
  attestation: "none"
  resident_key: "preferred"
  user_verification: "preferred"

magic_link:
  token_lifetime: "10m"
  redirect_url: "https://auth.buildersmty.com.mx/auth/callback"

smtp:
  host: "smtp.resend.com"
  port: 465
  username: "resend"
  password: "${RESEND_API_KEY}"
  from: "raul@mail.buildersmty.com.mx"
  from_name: "BuildersMTY"

mfa:
  issuer: "SharkAuth"
  recovery_codes: 10

social:
  google:
    client_id: "${GOOGLE_CLIENT_ID}"
    client_secret: "${GOOGLE_CLIENT_SECRET}"
  github:
    client_id: "${GITHUB_CLIENT_ID}"
    client_secret: "${GITHUB_CLIENT_SECRET}"
  apple:
    client_id: "${APPLE_CLIENT_ID}"
    team_id: "${APPLE_TEAM_ID}"
    key_id: "${APPLE_KEY_ID}"
    private_key_path: "./apple_auth_key.p8"
  discord:
    client_id: "${DISCORD_CLIENT_ID}"
    client_secret: "${DISCORD_CLIENT_SECRET}"

sso:
  saml:
    sp_entity_id: "https://auth.buildersmty.com.mx"
  oidc: {}

api_keys:
  default_rate_limit: 1000
  key_max_lifetime: "365d"

audit:
  retention: "0"
  cleanup_interval: "1h"

admin:
  api_key: "${SHARKAUTH_ADMIN_KEY}"
