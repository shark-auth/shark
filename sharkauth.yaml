server:
  port: 8080
  secret: "${SHARKAUTH_SECRET}"
  base_url: "https://auth.myapp.com"

storage:
  path: "./data/sharkauth.db"

auth:
  session_lifetime: "30d"
  password_min_length: 8

passkeys:
  rp_name: "My App"
  rp_id: ""
  origin: ""
  attestation: "none"
  resident_key: "preferred"
  user_verification: "preferred"

magic_link:
  token_lifetime: "10m"
  redirect_url: "http://localhost:3000/auth/callback"

smtp:
  host: "${SMTP_HOST}"
  port: 587
  username: "${SMTP_USER}"
  password: "${SMTP_PASS}"
  from: "auth@myapp.com"
  from_name: "My App"

mfa:
  issuer: "SharkAuth"
  recovery_codes: 10

social:
  google:
    client_id: "${GOOGLE_CLIENT_ID}"
    client_secret: "${GOOGLE_CLIENT_SECRET}"
  github:
    client_id: "${GITHUB_CLIENT_ID}"
    client_secret: "${GITHUB_CLIENT_SECRET}"
  apple:
    client_id: "${APPLE_CLIENT_ID}"
    team_id: "${APPLE_TEAM_ID}"
    key_id: "${APPLE_KEY_ID}"
    private_key_path: "./apple_auth_key.p8"
  discord:
    client_id: "${DISCORD_CLIENT_ID}"
    client_secret: "${DISCORD_CLIENT_SECRET}"

sso:
  saml:
    sp_entity_id: "https://auth.myapp.com"
  oidc: {}

api_keys:
  default_rate_limit: 1000
  key_max_lifetime: "365d"

audit:
  retention: "0"
  cleanup_interval: "1h"

admin:
  api_key: "${SHARKAUTH_ADMIN_KEY}"
