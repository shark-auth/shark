# Generated by shark init. Minimum config — everything else has defaults.
# Full reference: https://sharkauth.com/docs/config

server:
  secret: "b8bcb06baef6cb109aed3d298a4a1b9d865aa0397b72c8d8b63ee0034e49ac91"              # required: 32+ bytes, encrypts sessions
  base_url: "http://localhost:8080"         # required: determines cookie/origin

email:
  provider: "shark"                     # shark.email testing tier — switch before production
  # Switch to your real provider via:
  #   - edit this block (provider: resend | smtp | ses | postmark | mailgun)
  #   - shark email setup
  #   - Settings → Email in the admin dashboard
  # Docs: https://sharkauth.com/docs/email

proxy:
  enabled: true
  upstream: "http://localhost:3000"
  timeout_seconds: 30
  rules:
    # Public paths — no auth required
    - path: /login
      allow: anonymous
    - path: /signup
      allow: anonymous
    - path: /public/*
      allow: anonymous
    - path: /favicon.ico
      allow: anonymous
    - path: /static/*
      allow: anonymous
    - path: /_next/*
      allow: anonymous
    # Everything else = authed
    - path: /*
      require: authenticated

# Telemetry — anonymous install ping so we can measure launch reach.
# Payload: {install_id (random UUID, generated first boot), version,
# os, arch, uptime_s, started_at, go_version}. No user data, no counts,
# no IPs. Opt out by setting enabled: false.
telemetry:
  enabled: true
  endpoint: "https://telemetry.shark-auth.com/v1/ping"
