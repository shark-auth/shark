openapi: "3.1.0"

info:
  title: SharkAuth API
  version: "0.9.0"
  summary: "Open-source OAuth 2.1 authorization server with native agent delegation."
  description: |
    SharkAuth is a single-binary, open-source authentication platform purpose-built
    for the agent era. It ships every primitive a modern auth product needs â€”
    SSO (SAML + OIDC), passkeys (WebAuthn), TOTP MFA, magic links, social login,
    organizations + RBAC, audit log, webhooks, reverse-proxy mode â€” plus
    native RFC 8693 token-exchange with full agent delegation chains.

    ### Surfaces

    The API is partitioned into five surfaces. Each lives in its own file under
    `sections/` for readability and tooling. The full spec is the union of the
    five sections plus this master file's components.

    | Section | Path prefix | What |
    |---|---|---|
    | OAuth 2.1 Authorization Server | `/oauth/*`, `/.well-known/*` | Token issuance, introspection, revocation, DCR, device flow, token-exchange. |
    | Authentication & Identity | `/api/v1/auth/*` | User-facing signup/login/MFA/passkey/magic-link/SSO. |
    | Platform | `/api/v1/organizations`, `/roles`, `/permissions`, `/users`, `/sso`, `/api-keys`, `/audit-logs`, `/webhooks`, `/agents` | Multi-tenant org model, RBAC, SSO connections, agents, webhooks, audit. |
    | Admin Operations | `/api/v1/admin/*`, `/api/v1/vault/*` | Operator tools: health, config, apps, vault, branding, email templates, proxy rules + lifecycle, paywall. |
    | System | `/healthz`, `/assets/branding/*`, `/hosted/*`, `/paywall/*` | Liveness probe, hosted pages, branding assets. |

    ### Authentication

    Most endpoints require either a session cookie (`shark_session`) or a bearer
    token (session JWT or admin API key). OAuth endpoints follow RFC 6749 +
    RFC 7591 + RFC 9449 client authentication rules.

    Public endpoints (signup, login, password reset send, magic link send +
    verify, social login start, paywall, healthz, hosted pages, branding assets)
    require no authentication.

    ### Errors

    Two error envelopes coexist by surface:

    1. **OAuth surface** (`/oauth/*`) â€” RFC 6749 Â§5.2 shape:
       `{error, error_description, error_uri}`.
    2. **Auth + Platform + Admin surfaces** â€” extended shape:
       `{error, code, message, docs_url, details}`.

    See the per-section files and `docs/errors.md` in the repo for the full
    error catalog.

    ### Versioning

    `info.version` tracks the SharkAuth release. v0.9.x is the launch line;
    v1.0.0 is gated on two weeks of partner usage without breaking changes.
    Breaking schema changes will bump the major version and ship a migration
    note in `CHANGELOG.md`.

    ### Source of truth

    Every operation includes an `x-source` extension pointing to the file +
    line in the codebase where the route is registered. Use it to verify
    spec accuracy against the implementation.
  contact:
    name: "SharkAuth"
    url: "https://sharkauth.com"
    email: "support@sharkauth.com"
  license:
    name: "MIT"
    url: "https://github.com/shark-auth/shark/blob/main/LICENSE"

servers:
  - url: "https://sharkauth.example.com"
    description: "Your SharkAuth deployment (replace with your hostname)"
  - url: "http://localhost:8080"
    description: "Local development (`shark serve --dev`)"

externalDocs:
  description: "SharkAuth documentation site"
  url: "https://sharkauth.com/docs"

