# ---------------------------------------------------------------------------
# Shared components used across all sections.
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Session JWT (set by login, refresh on `/oauth/token` refresh grant) or
        admin API key. Send as `Authorization: Bearer <token>`.
    cookieAuth:
      type: apiKey
      in: cookie
      name: shark_session
      description: "Set by browser flows (signup/login/social login). HttpOnly + Secure + SameSite=Lax."
    dpopHeader:
      type: apiKey
      in: header
      name: DPoP
      description: |
        RFC 9449 proof-of-possession JWT signed by the client's private key.
        Required on protected resources when the access token has a `cnf.jkt`
        thumbprint claim.
    clientSecretBasic:
      type: http
      scheme: basic
      description: "OAuth client credentials via HTTP Basic. Used at `/oauth/token` for confidential clients."
    clientSecretPost:
      type: apiKey
      in: header
      name: Authorization
      description: "OAuth client credentials in form-encoded body (`client_id` + `client_secret` fields)."
    privateKeyJwt:
      type: oauth2
      description: "RFC 7521 client_assertion via signed JWT â€” for high-assurance clients."
      flows:
        clientCredentials:
          tokenUrl: "/oauth/token"
          scopes: {}
    oauth2AuthorizationCode:
      type: oauth2
      description: "Standard OAuth 2.1 authorization code flow with PKCE."
      flows:
        authorizationCode:
          authorizationUrl: "/oauth/authorize"
          tokenUrl: "/oauth/token"
          refreshUrl: "/oauth/token"
          scopes:
            openid: "Issue an OIDC id_token"
            profile: "Read basic profile"
            email: "Read user email"
    oauth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "/oauth/token"
          scopes: {}
    oauth2DeviceCode:
      type: oauth2
      flows:
        # OpenAPI 3.1 supports deviceCode flow on some renderers
        clientCredentials:
          tokenUrl: "/oauth/token"
          scopes: {}
          x-deviceAuthorizationUrl: "/oauth/device"

  schemas:
    OAuthError:
      type: object
      description: "RFC 6749 Â§5.2 standard error envelope used by all `/oauth/*` endpoints."
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_request, invalid_client, invalid_grant, unauthorized_client, unsupported_grant_type, invalid_scope, access_denied, unsupported_response_type, server_error, temporarily_unavailable, invalid_token, insufficient_scope, expired_token, invalid_dpop_proof, use_dpop_nonce, slow_down, authorization_pending]
        error_description: { type: string }
        error_uri: { type: string, format: uri }

    ErrorEnvelope:
      type: object
      description: "Extended error envelope used by `/api/v1/auth/*`, `/api/v1/*` (platform), and `/api/v1/admin/*`."
      required: [error, code, message]
      properties:
        error: { type: string, description: "Stable category: `validation_error`, `not_found`, `forbidden`, `conflict`, `rate_limited`, `internal_error`." }
        code: { type: string, description: "Stable per-error string code, e.g. `EMAIL_ALREADY_REGISTERED`." }
        message: { type: string, description: "Human-readable message safe to surface to end users." }
        docs_url: { type: string, format: uri, description: "Link to the docs entry for this code." }
        details: { type: object, additionalProperties: true, description: "Optional structured context (validation errors, rate-limit retry-after, etc)." }

    Pagination:
      type: object
      properties:
        limit: { type: integer, minimum: 1, maximum: 200, default: 50 }
        offset: { type: integer, minimum: 0, default: 0 }
        total: { type: integer, minimum: 0 }

