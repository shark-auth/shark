                    scope: mcp:tools:read mcp:tools:invoke
                    client_id: shark_dcr_yfWkz7LpQaXbNe9RsJc2m
                    sub: usr_18da62
                    aud: https://mcp.example.com
                    iss: https://sharkauth.example.com
                    jti: jti_8d7109a0
                    iat: 1765987654
                    exp: 1765991254
                    token_type: Bearer
