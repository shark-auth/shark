components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Session JWT (set by login, refresh on `/oauth/token` refresh grant) or

        admin API key. Send as `Authorization: Bearer <token>`.

        '
    cookieAuth:
      type: apiKey
      in: cookie
      name: shark_session
      description: Set by browser flows (signup/login/social login). HttpOnly + Secure + SameSite=Lax.
    dpopHeader:
      type: apiKey
      in: header
      name: DPoP
      description: 'RFC 9449 proof-of-possession JWT signed by the client''s private key.

        Required on protected resources when the access token has a `cnf.jkt`

        thumbprint claim.

        '
    clientSecretBasic:
      type: http
      scheme: basic
      description: OAuth client credentials via HTTP Basic. Used at `/oauth/token` for confidential clients.
    clientSecretPost:
      type: apiKey
      in: header
      name: Authorization
      description: OAuth client credentials in form-encoded body (`client_id` + `client_secret` fields).
    privateKeyJwt:
      type: oauth2
      description: RFC 7521 client_assertion via signed JWT — for high-assurance clients.
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes: {}
    oauth2AuthorizationCode:
      type: oauth2
      description: Standard OAuth 2.1 authorization code flow with PKCE.
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          refreshUrl: /oauth/token
          scopes:
            openid: Issue an OIDC id_token
            profile: Read basic profile
            email: Read user email
    oauth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes: {}
    oauth2DeviceCode:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes: {}
          x-deviceAuthorizationUrl: /oauth/device
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Signed ES256 JWT access token issued by `/oauth/token`. Verify via the

        keys at `/.well-known/jwks.json`. Tokens include `client_id`, `scope`,

        `jti`, and (if DPoP was used) `cnf.jkt`.

        '
    dpop:
      type: apiKey
      in: header
      name: DPoP
      description: 'DPoP proof JWT per RFC 9449. The proof is a short-lived `dpop+jwt`

        signed by the client''s private key. The public key travels in the

        `jwk` header of the proof. SharkAuth computes the JWK thumbprint and

        stamps it into the access token as the `cnf.jkt` claim.


        Required claims in the proof JWT:


        - `htm` — HTTP method (upper-case)

        - `htu` — fully-qualified request URL (no query/fragment)

        - `iat` — issued-at within a 60-second window

        - `jti` — unique identifier (replay-checked in-memory)

        - `ath` — base64url(sha256(access_token)) on resource requests


        Permitted algorithms: ES256, ES384, ES512, RS256, RS384, RS512,

        PS256, PS384, PS512, EdDSA. Symmetric algorithms are rejected.

        '
    client_secret_basic:
      type: http
      scheme: basic
      description: 'RFC 6749 §2.3.1 HTTP Basic authentication using `client_id`

        as the username and `client_secret` as the password.

        '
    client_secret_post:
      type: apiKey
      in: query
      name: client_secret
      description: 'RFC 6749 §2.3.1 — `client_id` and `client_secret` submitted as

        `application/x-www-form-urlencoded` body parameters. Shown here as

        `apiKey`/query for OpenAPI expressiveness; in practice they MUST be

        sent in the request body.

        '
    private_key_jwt:
      type: apiKey
      in: query
      name: client_assertion
      description: 'RFC 7521 + RFC 7523 — client authentication via a signed JWT

        assertion. Set `client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer`

        and pass the assertion in the `client_assertion` form parameter.

        '
    registration_access_token:
      type: http
      scheme: bearer
      description: 'RFC 7592 per-client bearer token returned at DCR time as

        `registration_access_token`. Required for GET / PUT / DELETE on

        `/oauth/register/{client_id}`.

        '
    sessionCookie:
      type: apiKey
      in: cookie
      name: shark_session
      description: 'Session cookie set by `/auth/signup`, `/auth/login`, the OAuth callback,

        magic-link verify, and passkey login. HttpOnly, Secure (when served

        over HTTPS), SameSite=Lax.

        '
  schemas:
    OAuthError:
      type: object
      description: RFC 6749 §5.2 standard error envelope used by all `/oauth/*` endpoints.
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          - access_denied
          - unsupported_response_type
          - server_error
          - temporarily_unavailable
          - invalid_token
          - insufficient_scope
          - expired_token
          - invalid_dpop_proof
          - use_dpop_nonce
          - slow_down
          - authorization_pending
          description: Machine-readable error code.
          examples:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          - invalid_token
          - invalid_dpop_proof
          - access_denied
          - authorization_pending
          - slow_down
          - expired_token
          - server_error
        error_description:
          type: string
          description: Human-readable description. Safe to log; not safe to show to end-users verbatim.
        error_uri:
          type: string
          format: uri
          description: Optional URI to a page documenting the error.
    ErrorEnvelope:
      type: object
      description: Extended error envelope used by `/api/v1/auth/*`, `/api/v1/*` (platform), and `/api/v1/admin/*`.
      required:
      - error
      - code
      - message
      properties:
        error:
          type: string
          description: 'Stable category: `validation_error`, `not_found`, `forbidden`, `conflict`, `rate_limited`, `internal_error`.'
          example: invalid_credentials
        code:
          type: string
          description: Stable per-error string code, e.g. `EMAIL_ALREADY_REGISTERED`.
          example: invalid_credentials
        message:
          type: string
          description: Human-readable message safe to surface to end users.
          example: Invalid email or password
        docs_url:
          type: string
          format: uri
          description: Link to the docs entry for this code.
          example: https://docs.shark-auth.com/errors/invalid_credentials
        details:
          type: object
          additionalProperties: true
          description: Optional structured context (validation errors, rate-limit retry-after, etc).
          example:
            retry_after: 300
    Pagination:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        offset:
          type: integer
          minimum: 0
          default: 0
        total:
          type: integer
          minimum: 0
    AuthServerMetadata:
      type: object
      description: RFC 8414 Authorization Server Metadata document.
      required:
      - issuer
      - authorization_endpoint
      - token_endpoint
      - jwks_uri
      - response_types_supported
      - grant_types_supported
      properties:
        issuer:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com
        authorization_endpoint:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/authorize
        token_endpoint:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/token
        jwks_uri:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/.well-known/jwks.json
        registration_endpoint:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/register
        revocation_endpoint:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/revoke
        introspection_endpoint:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/introspect
        device_authorization_endpoint:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/device
        response_types_supported:
          type: array
          items:
            type: string
          examples:
          - - code
        response_modes_supported:
          type: array
          items:
            type: string
          examples:
          - - query
        grant_types_supported:
          type: array
          items:
            type: string
          examples:
          - - authorization_code
            - client_credentials
            - refresh_token
            - urn:ietf:params:oauth:grant-type:device_code
            - urn:ietf:params:oauth:grant-type:token-exchange
        code_challenge_methods_supported:
          type: array
          items:
            type: string
          examples:
          - - S256
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
          examples:
          - - client_secret_basic
            - client_secret_post
            - private_key_jwt
            - none
        token_endpoint_auth_signing_alg_values_supported:
          type: array
          items:
            type: string
          examples:
          - - ES256
            - RS256
        scopes_supported:
          type: array
          items:
            type: string
          examples:
          - - openid
            - profile
            - email
        dpop_signing_alg_values_supported:
          type: array
          items:
            type: string
          examples:
          - - ES256
            - RS256
        service_documentation:
          type: string
          format: uri
          examples:
          - https://sharkauth.com/docs
    JWK:
      type: object
      description: JSON Web Key per RFC 7517.
      required:
      - kty
      - kid
      - use
      properties:
        kty:
          type: string
          examples:
          - EC
          - RSA
        use:
          type: string
          examples:
          - sig
        alg:
          type: string
          examples:
          - ES256
          - RS256
        kid:
          type: string
          examples:
          - key_2026_04_24_es256
        crv:
          type: string
          description: Curve name for EC keys.
          examples:
          - P-256
        x:
          type: string
          description: EC x coordinate (base64url, RFC 7518 §6.2).
        y:
          type: string
          description: EC y coordinate (base64url).
        n:
          type: string
          description: RSA modulus (base64url).
        e:
          type: string
          description: RSA public exponent (base64url).
          examples:
          - AQAB
    JWKS:
      type: object
      required:
      - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JWK'
    AuthorizationResponse:
      type: object
      description: 'The authorization endpoint responds with a 302 redirect to

        `redirect_uri` carrying these parameters in the query string. This

        schema documents the shape of that URL fragment/query.

        '
      required:
      - code
      - state
      properties:
        code:
          type: string
          description: Authorization code (one-time, short-lived, single-use).
          examples:
          - eyJjb2RlIjoiYWJjIn0.fGpZhg-yq
        state:
          type: string
          description: Echo of the client's `state` parameter. Verify to defeat CSRF.
          examples:
          - xyz-csrf-nonce-42
        iss:
          type: string
          format: uri
          description: RFC 9207 issuer identifier echo (when configured).
    TokenRequest:
      description: 'Token endpoint request shape. The `grant_type` field determines

        which additional fields are required.

        '
      oneOf:
      - $ref: '#/components/schemas/TokenRequestAuthorizationCode'
      - $ref: '#/components/schemas/TokenRequestClientCredentials'
      - $ref: '#/components/schemas/TokenRequestRefreshToken'
      - $ref: '#/components/schemas/TokenRequestDeviceCode'
      - $ref: '#/components/schemas/TokenExchangeRequest'
      discriminator:
        propertyName: grant_type
        mapping:
          authorization_code: '#/components/schemas/TokenRequestAuthorizationCode'
          client_credentials: '#/components/schemas/TokenRequestClientCredentials'
          refresh_token: '#/components/schemas/TokenRequestRefreshToken'
          urn:ietf:params:oauth:grant-type:device_code: '#/components/schemas/TokenRequestDeviceCode'
          urn:ietf:params:oauth:grant-type:token-exchange: '#/components/schemas/TokenExchangeRequest'
    TokenRequestAuthorizationCode:
      type: object
      required:
      - grant_type
      - code
      - redirect_uri
      - client_id
      properties:
        grant_type:
          type: string
          enum:
          - authorization_code
        code:
          type: string
          description: Authorization code received at the redirect URI.
        redirect_uri:
          type: string
          format: uri
          description: Must exactly match the `redirect_uri` used in the authorize step.
        client_id:
          type: string
        client_secret:
          type: string
          description: Required for confidential clients; omit for public + PKCE.
        code_verifier:
          type: string
          description: RFC 7636 PKCE verifier. Required for public clients.
          examples:
          - dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk
        resource:
          type: string
          format: uri
          description: RFC 8707 resource indicator.
    TokenRequestClientCredentials:
      type: object
      required:
      - grant_type
      properties:
        grant_type:
          type: string
          enum:
          - client_credentials
        client_id:
          type: string
        client_secret:
          type: string
        scope:
          type: string
          description: Space-separated scope list.
          examples:
          - mcp:tools:read mcp:tools:invoke
        resource:
          type: string
          format: uri
          description: RFC 8707 resource indicator. Populates `aud` on the issued JWT.
          examples:
          - https://mcp.example.com
        audience:
          type: string
          description: Alternate audience targeting (RFC 8693 style).
    TokenRequestRefreshToken:
      type: object
      required:
      - grant_type
      - refresh_token
      properties:
        grant_type:
          type: string
          enum:
          - refresh_token
        refresh_token:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        scope:
          type: string
          description: Optional scope narrowing. Must be a subset of the original grant.
    TokenRequestDeviceCode:
      type: object
      required:
      - grant_type
      - device_code
      - client_id
      properties:
        grant_type:
          type: string
          enum:
          - urn:ietf:params:oauth:grant-type:device_code
        device_code:
          type: string
          description: The `device_code` returned by `POST /oauth/device`.
        client_id:
          type: string
    TokenExchangeRequest:
      type: object
      description: 'RFC 8693 token-exchange request. The acting agent authenticates with

        its own client credentials, presents a `subject_token` (a JWT issued

        by this server), and receives a new JWT containing an `act` claim

        that records the full delegation chain. If the subject already has

        an `act` claim, it is nested inside the new one so the whole

        delegation history remains inspectable.

        '
      required:
      - grant_type
      - subject_token
      - subject_token_type
      properties:
        grant_type:
          type: string
          enum:
          - urn:ietf:params:oauth:grant-type:token-exchange
        subject_token:
          type: string
          description: JWT whose subject the acting agent wants to act on behalf of.
        subject_token_type:
          type: string
          enum:
          - urn:ietf:params:oauth:token-type:access_token
          description: Only access-token subjects are supported today.
        actor_token:
          type: string
          description: 'Optional JWT identifying the acting party when the `Authorization`

            header does not carry it. In SharkAuth the acting agent is

            authenticated via HTTP Basic / form `client_id`+`client_secret`;

            `actor_token` is accepted but not required.

            '
        actor_token_type:
          type: string
          enum:
          - urn:ietf:params:oauth:token-type:access_token
        requested_token_type:
          type: string
          enum:
          - urn:ietf:params:oauth:token-type:access_token
          description: Defaults to access_token if omitted.
        scope:
          type: string
          description: 'Requested scopes; must be a subset of the subject token''s scopes.

            If omitted, the subject token''s scopes carry over unchanged.

            '
        audience:
          type: string
          description: Target audience for the issued token (RFC 8693 §2.1).
        resource:
          type: string
          format: uri
          description: RFC 8707 resource indicator. Checked against `audience` fallback order.
        client_id:
          type: string
        client_secret:
          type: string
    TokenResponse:
      type: object
      description: RFC 6749 §5.1 successful token response.
      required:
      - access_token
      - token_type
      properties:
        access_token:
          type: string
          description: Signed ES256 JWT. Verify via `/.well-known/jwks.json`.
          examples:
          - eyJhbGciOiJFUzI1NiIsImtpZCI6ImtleV8yMDI2XzA0XzI0X2VzMjU2IiwidHlwIjoiSldUIn0.eyJpc3MiOiJodHRwczovL3NoYXJrYXV0aC5leGFtcGxlLmNvbSIsInN1YiI6InVzcl8xOGRhNjIiLCJhdWQiOiJodHRwczovL21jcC5leGFtcGxlLmNvbSIsImNsaWVudF9pZCI6InNoYXJrX2Rjcl9hYmMxMjMiLCJzY29wZSI6Im1jcDp0b29sczpyZWFkIiwianRpIjoianRpXzhkNzEwOWEiLCJpYXQiOjE3NjU5ODc2NTQsImV4cCI6MTc2NTk5MTI1NCwiY25mIjp7Imprd
            CI6ImFGa0xwbWlueFBfTHh1WnRwQnN0S2I5SnpVR0JXaW9lTS1uc1JKSXN2WXMifX0.MEQCIAbcdef...
        token_type:
          type: string
          enum:
          - Bearer
          - bearer
          - DPoP
          description: '`Bearer` for standard tokens, `DPoP` if the request included a

            valid DPoP proof (RFC 9449 §5).

            '
        expires_in:
          type: integer
          description: Lifetime of the access token in seconds.
          examples:
          - 3600
        refresh_token:
          type: string
          description: Issued when `offline_access` semantics apply (authorization_code / device_code flows).
        scope:
          type: string
          description: Space-separated list of scopes actually granted (may be narrower than requested).
          examples:
          - mcp:tools:read mcp:tools:invoke
        issued_token_type:
          type: string
          description: RFC 8693 — present only on token-exchange responses.
          enum:
          - urn:ietf:params:oauth:token-type:access_token
    RevokeRequest:
      type: object
      required:
      - token
      properties:
        token:
          type: string
          description: The access_token or refresh_token to revoke.
        token_type_hint:
          type: string
          enum:
          - access_token
          - refresh_token
          description: Optional hint to speed up server-side lookup.
    IntrospectRequest:
      type: object
      required:
      - token
      properties:
        token:
          type: string
        token_type_hint:
          type: string
          enum:
          - access_token
          - refresh_token
    IntrospectResponse:
      type: object
      description: 'RFC 7662 §2.2 introspection response. When `active` is false the

        server returns only the `active` field (all other claims are

        omitted — do NOT rely on their absence meaning anything else).

        '
      required:
      - active
      properties:
        active:
          type: boolean
          description: Whether the token is currently valid, unexpired, and unrevoked.
          examples:
          - true
        scope:
          type: string
          examples:
          - mcp:tools:read mcp:tools:invoke
        client_id:
          type: string
          examples:
          - shark_dcr_abc123
        sub:
          type: string
          examples:
          - usr_18da62
        exp:
          type: integer
          format: int64
          examples:
          - 1765991254
        iat:
          type: integer
          format: int64
          examples:
          - 1765987654
        nbf:
          type: integer
          format: int64
        aud:
          type: string
          examples:
          - https://mcp.example.com
        iss:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com
        jti:
          type: string
          examples:
          - jti_8d7109a0
        token_type:
          type: string
          examples:
          - Bearer
        agent_id:
          type: string
          description: SharkAuth-specific — internal agent identifier for the client.
          examples:
          - agent_yfWkz7Lp
        username:
          type: string
          description: Resolved user email when `sub` maps to a real user.
          examples:
          - hello@example.com
    DCRRequest:
      type: object
      description: RFC 7591 Dynamic Client Registration metadata.
      required:
      - client_name
      properties:
        client_name:
          type: string
          description: Human-readable client name.
          examples:
          - Claude Desktop
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          description: Required when `authorization_code` is in `grant_types`.
          examples:
          - - https://claude.example.com/oauth/callback
            - http://localhost:33418/callback
        grant_types:
          type: array
          items:
            type: string
            enum:
            - authorization_code
            - client_credentials
            - refresh_token
            - urn:ietf:params:oauth:grant-type:device_code
          examples:
          - - authorization_code
            - refresh_token
        response_types:
          type: array
          items:
            type: string
          examples:
          - - code
        token_endpoint_auth_method:
          type: string
          enum:
          - client_secret_basic
          - client_secret_post
          - private_key_jwt
          - none
          default: client_secret_basic
        scope:
          type: string
          description: Space-separated scope list.
          examples:
          - mcp:tools:read mcp:tools:invoke
        client_uri:
          type: string
          format: uri
        logo_uri:
          type: string
          format: uri
        tos_uri:
          type: string
          format: uri
        policy_uri:
          type: string
          format: uri
        contacts:
          type: array
          items:
            type: string
            format: email
    DCRResponse:
      allOf:
      - $ref: '#/components/schemas/DCRRequest'
      - type: object
        required:
        - client_id
        - client_id_issued_at
        - registration_access_token
        - registration_client_uri
        properties:
          client_id:
            type: string
            examples:
            - shark_dcr_yfWkz7LpQaXbNe9RsJc2m
          client_secret:
            type: string
            description: 'Only returned on initial registration (POST) and on secret

              rotation. Store it immediately — it is never re-issued.

              '
            examples:
            - b4cf1a6ec7eb4a9d8f0c1e2a3b4c5d6e7f8a9b0c1d2e3f405162738495a6b7c8
          client_id_issued_at:
            type: integer
            format: int64
            examples:
            - 1765987654
          client_secret_expires_at:
            type: integer
            format: int64
            description: 0 means "never expires" (current default).
            examples:
            - 0
          registration_access_token:
            type: string
            description: 'Bearer token authorizing subsequent RFC 7592 management

              calls on this client record. Only returned on initial

              registration and on explicit rotation.

              '
            examples:
            - 1f2e3d4c5b6a798807665544332211ffeeddccbbaa0099887766554433221100
          registration_client_uri:
            type: string
            format: uri
            examples:
            - https://sharkauth.example.com/oauth/register/shark_dcr_yfWkz7LpQaXbNe9RsJc2m
    DCRError:
      type: object
      description: RFC 7591 §3.2.2 error response.
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - invalid_client_metadata
          - invalid_redirect_uri
          - invalid_token
          - server_error
        error_description:
          type: string
    DeviceAuthRequest:
      type: object
      required:
      - client_id
      properties:
        client_id:
          type: string
        scope:
          type: string
          examples:
          - mcp:tools:read
        resource:
          type: string
          format: uri
          description: RFC 8707 resource indicator.
    DeviceAuthResponse:
      type: object
      description: RFC 8628 §3.2 device authorization response.
      required:
      - device_code
      - user_code
      - verification_uri
      - expires_in
      - interval
      properties:
        device_code:
          type: string
          description: Opaque base64url-encoded 32-byte random token. Hash-stored server-side.
          examples:
          - WUxJRCBkZXZpY2UgY29kZSB0b2tlbiBleGFtcGxlIHZhbHVlIHN0cmluZw
        user_code:
          type: string
          description: 8-char XXXX-XXXX code from unambiguous charset (no I, O, 0, 1).
          examples:
          - BRGH-K3QN
        verification_uri:
          type: string
          format: uri
          examples:
          - https://sharkauth.example.com/oauth/device/verify
        verification_uri_complete:
          type: string
          format: uri
          description: Pre-filled URL with user_code for QR-code-style flows.
          examples:
          - https://sharkauth.example.com/oauth/device/verify?user_code=BRGH-K3QN
        expires_in:
          type: integer
          description: Device code lifetime in seconds (default 900).
          examples:
          - 900
        interval:
          type: integer
          description: Minimum polling interval in seconds.
          examples:
          - 5
    User:
      type: object
      required:
      - id
      - email
      - emailVerified
      - mfaEnabled
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          example: usr_V1StGXR8_Z5jdHi6B-myT
        email:
          type: string
          format: email
          example: ada@example.com
        emailVerified:
          type: boolean
          example: true
        name:
          type: string
          nullable: true
          example: Ada Lovelace
        avatarUrl:
          type: string
          format: uri
          nullable: true
          example: https://cdn.example.com/a/ada.png
        mfaEnabled:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2026-04-01T09:11:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-24T18:05:00Z'
    SignupRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: ada@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: correct-horse-battery-staple
        name:
          type: string
          example: Ada Lovelace
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      description: 'User fields plus optional JWT material. In `access_refresh` JWT mode the

        response carries `access_token` + `refresh_token`; in the simpler

        single-token mode it carries `token`. Session cookie is always set.

        '
      allOf:
      - $ref: '#/components/schemas/User'
      - type: object
        properties:
          token:
            type: string
            description: Session JWT (single-token mode).
          access_token:
            type: string
            description: Short-lived access JWT (access_refresh mode).
          refresh_token:
            type: string
            description: Long-lived refresh JWT (access_refresh mode).
    MFARequiredResponse:
      description: Returned by `/auth/login` when the user has MFA enabled. The partial session cookie is set; satisfy via
        `/auth/mfa/challenge` or `/auth/mfa/recovery`.
      type: object
      required:
      - mfaRequired
      properties:
        mfaRequired:
          type: boolean
          const: true
    PasskeyCredential:
      type: object
      required:
      - id
      - transports
      - backed_up
      - created_at
      properties:
        id:
          type: string
          example: pkc_2k9fj3X...
        name:
          type: string
          nullable: true
          example: MacBook Touch ID
        transports:
          type: string
          description: Comma-separated WebAuthn transport list.
          example: internal,hybrid
        backed_up:
          type: boolean
          description: True if the authenticator reports the credential as backed up (syncable).
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
    WebAuthnRegistrationOptions:
      description: 'Response from `/auth/passkey/register/begin`. `publicKey` is the raw

        `PublicKeyCredentialCreationOptions` from the WebAuthn library; pass

        it directly to `navigator.credentials.create({publicKey})`.

        '
      type: object
      required:
      - publicKey
      - challengeKey
      properties:
        publicKey:
          type: object
          description: Opaque WebAuthn creation options (challenge, rp, user, pubKeyCredParams, excludeCredentials, etc.).
          additionalProperties: true
        challengeKey:
          type: string
          description: Server-side challenge lookup key. Echo back via the `X-Challenge-Key` header on `/register/finish`.
          example: chk_7b4f1e0c3a9d2...
    WebAuthnRegistrationCompletion:
      description: 'Raw `PublicKeyCredential` from `navigator.credentials.create()` —

        shape defined by the WebAuthn Level 2 spec. Forwarded as-is to the

        server-side attestation verifier.

        '
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        rawId:
          type: string
          description: Base64url credential ID
        type:
          type: string
          enum:
          - public-key
        response:
          type: object
          properties:
            clientDataJSON:
              type: string
            attestationObject:
              type: string
    WebAuthnAuthenticationOptions:
      description: Response from `/auth/passkey/login/begin`. Pass `publicKey` to `navigator.credentials.get({publicKey})`.
      type: object
      required:
      - publicKey
      - challengeKey
      properties:
        publicKey:
          type: object
          additionalProperties: true
        challengeKey:
          type: string
    WebAuthnAuthenticationCompletion:
      description: Raw `PublicKeyCredential` assertion from `navigator.credentials.get()`.
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        rawId:
          type: string
        type:
          type: string
          enum:
          - public-key
        response:
          type: object
          properties:
            clientDataJSON:
              type: string
            authenticatorData:
              type: string
            signature:
              type: string
            userHandle:
              type: string
              nullable: true
    MagicLinkSendRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
    MFAEnrollResponse:
      type: object
      required:
      - secret
      - qr_uri
      properties:
        secret:
          type: string
          description: Base32-encoded TOTP shared secret. Treat as sensitive.
          example: JBSWY3DPEHPK3PXP
        qr_uri:
          type: string
          description: '`otpauth://totp/...` URI suitable for rendering as a QR code.'
          example: otpauth://totp/SharkAuth:ada@example.com?secret=JBSWY3DPEHPK3PXP&issuer=SharkAuth
    Session:
      type: object
      required:
      - id
      - user_id
      - mfa_passed
      - auth_method
      - expires_at
      - created_at
      properties:
        id:
          type: string
          example: ses_01HW...
        user_id:
          type: string
          example: usr_V1StGXR8_Z5jdHi6B-myT
        ip:
          type: string
          example: 203.0.113.42
        user_agent:
          type: string
        mfa_passed:
          type: boolean
        auth_method:
          type: string
          enum:
          - password
          - passkey
          - magic_link
          - oauth
          - sso
          example: password
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time
        current:
          type: boolean
          description: True on the caller's own session row in `GET /auth/sessions`.
    Consent:
      type: object
      required:
      - id
      - client_id
      - scope
      - granted_at
      properties:
        id:
          type: string
          example: cns_01HW...
        client_id:
          type: string
          example: cli_research_bot
        agent_name:
          type: string
          description: Display name of the client/agent, when registered.
        scope:
          type: string
          description: Space-delimited scope list granted to the client.
          example: openid profile email read:docs
        authorization_details:
          type: string
          description: RFC 9396 rich authorization details (JSON, stringified).
        granted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
    Organization:
      type: object
      required:
      - id
      - name
      - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Acme Robotics
        slug:
          type: string
          example: acme-robotics
        created_at:
          type: string
          format: date-time
        member_count:
          type: integer
          minimum: 0
    OrganizationMember:
      type: object
      required:
      - user_id
      - organization_id
      - joined_at
      properties:
        user_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        joined_at:
          type: string
          format: date-time
    Invitation:
      type: object
      required:
      - token
      - email
      - organization_id
      - expires_at
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        organization_id:
          type: string
          format: uuid
        invited_by:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
    Role:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: billing-admin
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
    Permission:
      type: object
      required:
      - id
      - resource
      - action
      properties:
        id:
          type: string
          format: uuid
        resource:
          type: string
          example: billing
        action:
          type: string
          example: read
        description:
          type: string
    UserAdmin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        mfa_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
        organizations:
          type: array
          items:
            type: string
            format: uuid
    SSOConnection:
      type: object
      required:
      - id
      - organization_id
      - kind
      - name
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        kind:
          type: string
          enum:
          - saml
          - oidc
        name:
          type: string
        saml_idp_metadata_url:
          type: string
          format: uri
          nullable: true
        saml_sp_entity_id:
          type: string
          nullable: true
        oidc_issuer:
          type: string
          format: uri
          nullable: true
        oidc_client_id:
          type: string
          nullable: true
        attribute_mappings:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
    APIKey:
      type: object
      required:
      - id
      - name
      - prefix
      - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: ci-deploy-key
        prefix:
          type: string
          example: sk_live_abc12
        scopes:
          type: array
          items:
            type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    APIKeyCreated:
      allOf:
      - $ref: '#/components/schemas/APIKey'
      - type: object
        properties:
          secret:
            type: string
            description: Plaintext API key — shown once at creation, never returned again.
            example: sk_live_abc12_d7f...6e4
    AuditLog:
      type: object
      required:
      - id
      - ts
      - actor_id
      - action
      properties:
        id:
          type: string
          format: uuid
        ts:
          type: string
          format: date-time
        actor_id:
          type: string
          format: uuid
          nullable: true
        actor_type:
          type: string
          enum:
          - user
          - agent
          - system
        organization_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
          example: user.login
        target_type:
          type: string
        target_id:
          type: string
        status:
          type: string
          enum:
          - success
          - failure
        ip:
          type: string
        user_agent:
          type: string
        metadata:
          type: object
          additionalProperties: true
    Webhook:
      type: object
      required:
      - id
      - url
      - events
      - secret_prefix
      properties:
        id:
          type: string
          format: uuid
