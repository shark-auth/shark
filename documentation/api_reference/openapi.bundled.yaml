paths:
  /.well-known/oauth-authorization-server:
    get:
      operationId: getAuthorizationServerMetadata
      tags:
      - oauth-discovery
      summary: Fetch OAuth 2.0 Authorization Server Metadata.
      description: 'Returns the RFC 8414 discovery document describing this server''s

        endpoints, supported grant types, code-challenge methods, token

        endpoint auth methods, signing algorithms, scopes, and DPoP

        capabilities. This is the MCP discovery entrypoint — MCP clients

        start here, then use `registration_endpoint` (for DCR) and

        `authorization_endpoint` / `token_endpoint` for flows.


        Response is cacheable for 1 hour via `Cache-Control: public, max-age=3600`.

        '
      security:
      - {}
      x-source: internal/oauth/metadata.go:36
      responses:
        '200':
          description: Discovery document.
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthServerMetadata'
              example:
                issuer: https://sharkauth.example.com
                authorization_endpoint: https://sharkauth.example.com/oauth/authorize
                token_endpoint: https://sharkauth.example.com/oauth/token
                jwks_uri: https://sharkauth.example.com/.well-known/jwks.json
                registration_endpoint: https://sharkauth.example.com/oauth/register
                revocation_endpoint: https://sharkauth.example.com/oauth/revoke
                introspection_endpoint: https://sharkauth.example.com/oauth/introspect
                device_authorization_endpoint: https://sharkauth.example.com/oauth/device
                response_types_supported:
                - code
                response_modes_supported:
                - query
                grant_types_supported:
                - authorization_code
                - client_credentials
                - refresh_token
                - urn:ietf:params:oauth:grant-type:device_code
                - urn:ietf:params:oauth:grant-type:token-exchange
                code_challenge_methods_supported:
                - S256
                token_endpoint_auth_methods_supported:
                - client_secret_basic
                - client_secret_post
                - private_key_jwt
                - none
                token_endpoint_auth_signing_alg_values_supported:
                - ES256
                - RS256
                scopes_supported:
                - openid
                - profile
                - email
                dpop_signing_alg_values_supported:
                - ES256
                - RS256
                service_documentation: https://sharkauth.com/docs
  /.well-known/jwks.json:
    get:
      operationId: getJWKS
      tags:
      - oauth-discovery
      summary: Fetch the JSON Web Key Set.
      description: 'Returns RFC 7517 JWKS containing the active and recently-retired

        signing keys. The retirement window is 2x the access-token TTL so

        in-flight tokens signed with a just-rotated key remain verifiable

        until they expire. Cached for 5 minutes.


        Use these keys to validate the `access_token` JWT''s ES256 signature.

        Look up by `kid` from the JWT header.

        '
      security:
      - {}
      x-source: internal/api/well_known_handlers.go:73
      responses:
        '200':
          description: JWKS document.
          headers:
            Cache-Control:
              schema:
                type: string
              example: public, max-age=300
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'
              example:
                keys:
                - kty: EC
                  use: sig
                  alg: ES256
                  crv: P-256
                  kid: key_2026_04_24_es256
                  x: MKBCTNIcKUSDii11ySs3526iDZ8AiTo7Tu6KPAqv7D4
                  y: 4Etl6SRW2YiLUrN5vfvVHuhp7x8PxltmWWlbbM4IFyM
        '500':
          description: Failed to list signing keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
  /oauth/authorize:
    get:
      operationId: authorizeGet
      tags:
      - oauth-flow
      summary: Begin the authorization-code flow.
      description: "RFC 6749 §3.1 + RFC 7636 PKCE authorization endpoint. The client\nnavigates the end-user's browser here.\
        \ Behavior:\n\n1. If the user is not logged in, the server redirects to the\n   hosted login page for the application\n\
        \   (`/hosted/{app_slug}/login?...&return_to=<this-request>`).\n2. If logged in with an existing consent that covers\
        \ all requested\n   scopes, the server redirects straight back to `redirect_uri`\n   with `code` and `state`.\n3.\
        \ Otherwise the server renders the HTML consent page.\n\nPKCE is mandatory for public clients — omitting `code_challenge`\n\
        with `token_endpoint_auth_method=none` will be rejected at the\ntoken step. RFC 8707 `resource` is supported; SharkAuth\
        \ stamps it\ninto the issued token's `aud` claim.\n"
      security:
      - {}
      x-source: internal/oauth/handlers.go:181
      parameters:
      - name: response_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - code
      - name: client_id
        in: query
        required: true
        schema:
          type: string
      - name: redirect_uri
        in: query
        required: true
        schema:
          type: string
          format: uri
      - name: scope
        in: query
        schema:
          type: string
        description: Space-separated scope list.
      - name: state
        in: query
        schema:
          type: string
        description: Opaque CSRF nonce. Echoed in the redirect.
      - name: code_challenge
        in: query
        schema:
          type: string
        description: RFC 7636 PKCE challenge (base64url(sha256(verifier))).
      - name: code_challenge_method
        in: query
        schema:
          type: string
          enum:
          - S256
      - name: resource
        in: query
        schema:
          type: string
          format: uri
        description: RFC 8707 resource indicator.
      - name: audience
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Consent HTML page rendered (new consent required).
          content:
            text/html: {}
        '302':
          description: 'Either a redirect to `redirect_uri` carrying `code` + `state`

            (success) or a redirect to the hosted login page (user not

            authenticated). Error responses are also 302 back to

            `redirect_uri` with `error`, `error_description` per RFC 6749

            §4.1.2.1.

            '
          headers:
            Location:
              schema:
                type: string
                format: uri
    post:
      operationId: authorizeDecision
      tags:
      - oauth-flow
      summary: Submit a consent decision.
      description: 'Handles the HTML consent form POST. The server re-parses the

        original authorization request from the `challenge` field (the

        original query string carried through the consent page), records

        the consent grant, and redirects back to `redirect_uri` with code.

        Submitting `approved=false` returns an RFC 6749 `access_denied`

        error via redirect.

        '
      security:
      - {}
      x-source: internal/oauth/handlers.go:276
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - approved
              - challenge
              properties:
                approved:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
                challenge:
                  type: string
                  description: Full original query string from the authorize GET.
      responses:
        '302':
          description: Redirect back to redirect_uri with code or error.
        '401':
          description: End-user authentication required (session expired during consent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
              example:
                error: login_required
                error_description: End-user authentication is required
  /oauth/token:
    post:
      operationId: token
      tags:
      - oauth-tokens
      summary: Exchange an authorization grant for tokens.
      description: "Unified token endpoint supporting five grant types (selected via\nthe `grant_type` field):\n\n- `authorization_code`\
        \ — standard code flow (RFC 6749 §4.1).\n- `client_credentials` — machine-to-machine (RFC 6749 §4.4).\n- `refresh_token`\
        \ — token refresh (RFC 6749 §6). Rotating.\n- `urn:ietf:params:oauth:grant-type:device_code` — device flow\n  polling\
        \ (RFC 8628). Returns `authorization_pending`, `slow_down`,\n  `access_denied`, or `expired_token` until the user\
        \ approves.\n- `urn:ietf:params:oauth:grant-type:token-exchange` — RFC 8693\n  delegation. Acting agent presents a\
        \ `subject_token`; receives a\n  new JWT with an `act` claim recording the full delegation chain.\n  Scope narrowing\
        \ enforced: requested scopes MUST be a subset of\n  the subject token's scopes. Optional `may_act` claim on the\n\
        \  subject token gates which clients can act as delegates.\n\n**DPoP**: if a valid `DPoP` header is present, the proof's\
        \ JWK\nthumbprint is stamped into the issued JWT as `cnf.jkt` and the\ntoken type becomes `DPoP` (RFC 9449 §5).\n\n\
        Issued access tokens are signed ES256 JWTs with at minimum\n`iss`, `sub`, `aud`, `client_id`, `scope`, `jti`, `iat`,\
        \ `exp`.\n"
      x-source: internal/oauth/handlers.go:47
      security:
      - client_secret_basic: []
      - client_secret_post: []
      - private_key_jwt: []
      - {}
      parameters:
      - name: DPoP
        in: header
        schema:
          type: string
        description: 'Optional DPoP proof JWT (RFC 9449). Example value (line-broken for display):

          `eyJ0eXAiOiJkcG9wK2p3dCIsImFsZyI6IkVTMjU2IiwiandrIjp7Imt0eSI6IkVDIiwiY3J2IjoiUC0yNTYiLCJ4IjoibDhwcnQ4MDAiLCJ5IjoiWmhQN2VVTSJ9fQ.eyJodG0iOiJQT1NUIiwiaHR1IjoiaHR0cHM6Ly9zaGFya2F1dGguZXhhbXBsZS5jb20vb2F1dGgvdG9rZW4iLCJpYXQiOjE3NjU5ODc2NTQsImp0aSI6IjE5YzYxOGE1In0.MEUCIQC...`

          '
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            examples:
              authorization_code:
                summary: authorization_code grant
                value:
                  grant_type: authorization_code
                  code: Ag8fX3Ab-cD12
                  redirect_uri: https://claude.example.com/oauth/callback
                  client_id: shark_dcr_yfWkz7LpQaXbNe9RsJc2m
                  code_verifier: dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk
              client_credentials:
                summary: client_credentials grant with resource indicator
                value:
                  grant_type: client_credentials
                  client_id: shark_dcr_yfWkz7LpQaXbNe9RsJc2m
                  client_secret: b4cf1a6ec7eb4a9d8f0c1e2a3b4c5d6e
                  scope: mcp:tools:read mcp:tools:invoke
                  resource: https://mcp.example.com
              refresh_token:
                summary: refresh_token rotation
                value:
                  grant_type: refresh_token
                  refresh_token: f3d4e5c6b7a8998877665544332211ff
                  client_id: shark_dcr_yfWkz7LpQaXbNe9RsJc2m
                  client_secret: b4cf1a6ec7eb4a9d8f0c1e2a3b4c5d6e
              device_code:
                summary: device_code grant (polling)
                value:
                  grant_type: urn:ietf:params:oauth:grant-type:device_code
                  device_code: WUxJRCBkZXZpY2UgY29kZSB0b2tlbiBleGFtcGxlIHZhbHVlIHN0cmluZw
                  client_id: shark_dcr_yfWkz7LpQaXbNe9RsJc2m
              token_exchange:
                summary: RFC 8693 delegation with subject + actor chain
                value:
                  grant_type: urn:ietf:params:oauth:grant-type:token-exchange
                  subject_token: eyJhbGciOiJFUzI1NiIsImtpZCI6ImtleV8yMDI2XzA0XzI0In0.eyJzdWIiOiJ1c3JfMTg...
                  subject_token_type: urn:ietf:params:oauth:token-type:access_token
                  actor_token: eyJhbGciOiJFUzI1NiJ9.eyJzdWIiOiJzaGFya19kY3JfcGFyZW50MTIzIn0....
                  actor_token_type: urn:ietf:params:oauth:token-type:access_token
                  requested_token_type: urn:ietf:params:oauth:token-type:access_token
                  scope: mcp:tools:read
                  resource: https://mcp.example.com
                  client_id: shark_dcr_yfWkz7LpQaXbNe9RsJc2m
                  client_secret: b4cf1a6ec7eb4a9d8f0c1e2a3b4c5d6e
      responses:
        '200':
          description: Token issued.
          headers:
            Cache-Control:
              schema:
                type: string
