        Bearer `sk_live_*`. Missing/unknown/revoked/expired tokens return

        `{"active": false}` with HTTP 200 (per RFC 7662 §2.2).


        Internally, SharkAuth looks tokens up three ways in order:

        1. JWT `jti` claim (if the token is a JWT).

        2. SHA-256 of the token''s signature segment (HMAC opaque format).

        3. SHA-256 of the full raw token string (fallback).

        '
      x-source: internal/oauth/introspect.go:45
      security:
