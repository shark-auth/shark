openapi: 3.1.0
info:
  title: SharkAuth API
  version: 0.9.0
  summary: Open-source OAuth 2.1 authorization server with native agent delegation.
  description: "SharkAuth is a single-binary, open-source authentication platform purpose-built\nfor the agent era. It ships\
    \ every primitive a modern auth product needs —\nSSO (SAML + OIDC), passkeys (WebAuthn), TOTP MFA, magic links, social\
    \ login,\norganizations + RBAC, audit log, webhooks, reverse-proxy mode — plus\nnative RFC 8693 token-exchange with full\
    \ agent delegation chains.\n\n### Surfaces\n\nThe API is partitioned into five surfaces. Each lives in its own file under\n\
    `sections/` for readability and tooling. The full spec is the union of the\nfive sections plus this master file's components.\n\
    \n| Section | Path prefix | What |\n|---|---|---|\n| OAuth 2.1 Authorization Server | `/oauth/*`, `/.well-known/*` | Token\
    \ issuance, introspection, revocation, DCR, device flow, token-exchange. |\n| Authentication & Identity | `/api/v1/auth/*`\
    \ | User-facing signup/login/MFA/passkey/magic-link/SSO. |\n| Platform | `/api/v1/organizations`, `/roles`, `/permissions`,\
    \ `/users`, `/sso`, `/api-keys`, `/audit-logs`, `/webhooks`, `/agents` | Multi-tenant org model, RBAC, SSO connections,\
    \ agents, webhooks, audit. |\n| Admin Operations | `/api/v1/admin/*`, `/api/v1/vault/*` | Operator tools: health, config,\
    \ apps, vault, branding, email templates, proxy rules + lifecycle, paywall. |\n| System | `/healthz`, `/assets/branding/*`,\
    \ `/hosted/*`, `/paywall/*` | Liveness probe, hosted pages, branding assets. |\n\n### Authentication\n\nMost endpoints\
    \ require either a session cookie (`shark_session`) or a bearer\ntoken (session JWT or admin API key). OAuth endpoints\
    \ follow RFC 6749 +\nRFC 7591 + RFC 9449 client authentication rules.\n\nPublic endpoints (signup, login, password reset\
    \ send, magic link send +\nverify, social login start, paywall, healthz, hosted pages, branding assets)\nrequire no authentication.\n\
    \n### Errors\n\nTwo error envelopes coexist by surface:\n\n1. **OAuth surface** (`/oauth/*`) — RFC 6749 §5.2 shape:\n\
    \   `{error, error_description, error_uri}`.\n2. **Auth + Platform + Admin surfaces** — extended shape:\n   `{error, code,\
    \ message, docs_url, details}`.\n\nSee the per-section files and `docs/errors.md` in the repo for the full\nerror catalog.\n\
    \n### Versioning\n\n`info.version` tracks the SharkAuth release. v0.9.x is the launch line;\nv1.0.0 is gated on two weeks\
    \ of partner usage without breaking changes.\nBreaking schema changes will bump the major version and ship a migration\n\
    note in `CHANGELOG.md`.\n\n### Source of truth\n\nEvery operation includes an `x-source` extension pointing to the file\
    \ +\nline in the codebase where the route is registered. Use it to verify\nspec accuracy against the implementation.\n"
  contact:
