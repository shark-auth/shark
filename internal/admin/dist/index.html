<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>SharkAuth · Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <style>
    @keyframes slideIn { from { transform: translateX(12px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Font tweak variants */
    body.font-ibm { --font-sans: 'IBM Plex Sans', -apple-system, sans-serif; --font-mono: 'IBM Plex Mono', monospace; }
    body.font-geist { --font-sans: 'Geist', -apple-system, sans-serif; --font-mono: 'Geist Mono', monospace; }
    body.font-space { --font-sans: 'Space Grotesk', -apple-system, sans-serif; --font-mono: 'JetBrains Mono', monospace; }

    .tweaks-panel {
      position: fixed; bottom: 16px; right: 16px;
      width: 260px;
      background: var(--surface-1);
      border: 1px solid var(--hairline-bright);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      padding: 12px;
      z-index: 40;
      font-size: 12px;
    }
    .tweaks-panel h3 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-dim); font-weight: 500; }
    .tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .tweak-row label { color: var(--fg-muted); font-size: 11.5px; }
    .seg { display: inline-flex; border: 1px solid var(--hairline-strong); border-radius: 4px; overflow: hidden; }
    .seg button { padding: 3px 7px; font-size: 10.5px; color: var(--fg-muted); background: var(--surface-2); border-right: 1px solid var(--hairline); }
    .seg button:last-child { border-right: 0; }
    .seg button.on { background: #fafafa; color: #000; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>

  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/mock.jsx"></script>
  <script type="text/babel" src="components/login.jsx"></script>
  <script type="text/babel" src="components/api.jsx"></script>
  <script type="text/babel" src="components/layout.jsx"></script>
  <script type="text/babel" src="components/overview.jsx"></script>
  <script type="text/babel" src="components/users.jsx"></script>
  <script type="text/babel" src="components/sessions.jsx"></script>
  <script type="text/babel" src="components/organizations.jsx"></script>
  <script type="text/babel" src="components/agents.jsx"></script>
  <script type="text/babel" src="components/device_flow.jsx"></script>
  <script type="text/babel" src="components/audit.jsx"></script>
  <script type="text/babel" src="components/applications.jsx"></script>
  <script type="text/babel" src="components/api_keys.jsx"></script>
  <script type="text/babel" src="components/webhooks.jsx"></script>
  <script type="text/babel" src="components/rbac.jsx"></script>
  <script type="text/babel" src="components/dev_inbox.jsx"></script>
  <script type="text/babel" src="components/sso.jsx"></script>
  <script type="text/babel" src="components/authentication.jsx"></script>
  <script type="text/babel" src="components/signing_keys.jsx"></script>
  <script type="text/babel" src="components/settings.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sidebarCollapsed": false,
      "font": "space"
    }/*EDITMODE-END*/;

    function useTweaks() {
      const [t, setT] = React.useState(() => {
        try { return { ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem('tweaks') || '{}')) }; }
        catch { return TWEAK_DEFAULTS; }
      });
      const set = (k, v) => setT(prev => {
        const next = { ...prev, [k]: v };
        try { localStorage.setItem('tweaks', JSON.stringify(next)); } catch {}
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
        return next;
      });
      return [t, set];
    }

    function App() {
      const [apiKey, setApiKey] = React.useState(() => sessionStorage.getItem('shark_admin_key') || '');

      const getPageFromURL = () => {
        const path = window.location.pathname.replace(/^\/admin\/?/, '').replace(/\/$/, '');
        return path || 'overview';
      };

      const [page, setPageState] = React.useState(getPageFromURL);

      const setPage = (p) => {
        window.history.pushState(null, '', '/admin/' + p);
        setPageState(p);
      };

      React.useEffect(() => {
        const handler = () => setPageState(getPageFromURL());
        window.addEventListener('popstate', handler);
        return () => window.removeEventListener('popstate', handler);
      }, []);

      const [tweaks, setTweak] = useTweaks();
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [editMode, setEditMode] = React.useState(false);

      // All hooks MUST be above any conditional return (React Rules of Hooks)

      React.useEffect(() => {
        document.body.className = 'font-' + tweaks.font;
      }, [tweaks.font]);

      // Listen for auth expiry from API wrapper (no reload race)
      React.useEffect(() => {
        const handler = () => setApiKey('');
        window.addEventListener('shark-auth-expired', handler);
        return () => window.removeEventListener('shark-auth-expired', handler);
      }, []);

      // Edit mode protocol
      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') { setEditMode(true); setTweaksOpen(true); }
          if (e.data?.type === '__deactivate_edit_mode') { setEditMode(false); setTweaksOpen(false); }
        };
        window.addEventListener('message', handler);
        try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
        return () => window.removeEventListener('message', handler);
      }, []);

      // Auth gate — after all hooks
      if (!apiKey) {
        return <Login onLogin={(k) => setApiKey(k)} />;
      }

      const Page = {
        overview: Overview,
        users: Users,
        sessions: Sessions,
        orgs: Organizations,
        agents: Agents,
        'device-flow': DeviceFlow,
        audit: Audit,
        apps: Applications,
        keys: ApiKeys,
        webhooks: Webhooks,
        rbac: RBAC,
        'dev-inbox': DevInbox,
        sso: SSO,
        auth: Authentication,
        signing: SigningKeys,
        settings: Settings,
      }[page] || Overview;

      return (
        <div style={{ display: 'flex', height: '100vh', background: 'var(--bg)' }}>
          <Sidebar page={page} setPage={setPage}
            collapsed={tweaks.sidebarCollapsed}
            setCollapsed={(v) => setTweak('sidebarCollapsed', v)}/>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}
               data-screen-label={'01 ' + page}>
            <TopBar page={page} setTweaksOpen={setTweaksOpen}/>
            <div style={{ flex: 1, overflow: 'hidden', animation: 'fadeIn 160ms ease-out' }}>
              <Page/>
            </div>
          </div>

          {tweaksOpen && (
            <div className="tweaks-panel">
              <div className="row" style={{ justifyContent: 'space-between', marginBottom: 8 }}>
                <h3 style={{margin:0}}>Tweaks</h3>
                <button className="btn ghost icon sm" onClick={() => setTweaksOpen(false)}><Icon.X width={11} height={11}/></button>
              </div>
              <div className="tweak-row">
                <label>Sidebar</label>
                <div className="seg">
                  <button className={!tweaks.sidebarCollapsed ? 'on' : ''} onClick={() => setTweak('sidebarCollapsed', false)}>Expanded</button>
                  <button className={tweaks.sidebarCollapsed ? 'on' : ''} onClick={() => setTweak('sidebarCollapsed', true)}>Collapsed</button>
                </div>
              </div>
              <div className="tweak-row">
                <label>Font</label>
                <div className="seg">
                  <button className={tweaks.font === 'inter' ? 'on' : ''} onClick={() => setTweak('font', 'inter')}>Inter</button>
                  <button className={tweaks.font === 'ibm' ? 'on' : ''} onClick={() => setTweak('font', 'ibm')}>IBM</button>
                  <button className={tweaks.font === 'geist' ? 'on' : ''} onClick={() => setTweak('font', 'geist')}>Geist</button>
                  <button className={tweaks.font === 'space' ? 'on' : ''} onClick={() => setTweak('font', 'space')}>Space</button>
                </div>
              </div>
              <div className="faint" style={{ fontSize: 10.5, marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--hairline)' }}>
                Dark theme, B&W palette. Dev preview.
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
