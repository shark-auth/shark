<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorize — SharkAuth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fafafa;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #0c0c0c;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    padding: 32px;
    max-width: 420px;
    width: 100%;
  }
  .agent-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .agent-logo {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #161616;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #a3a3a3;
    overflow: hidden;
    flex-shrink: 0;
  }
  .agent-logo img { width: 100%; height: 100%; object-fit: cover; }
  .agent-name { font-size: 18px; font-weight: 600; }
  .subtitle { color: #a3a3a3; font-size: 13px; margin-top: 2px; }
  h2 {
    font-size: 15px;
    font-weight: 500;
    color: #a3a3a3;
    margin-bottom: 16px;
  }
  .scopes {
    list-style: none;
    margin-bottom: 28px;
  }
  .scopes li {
    padding: 10px 14px;
    background: #121212;
    border: 1px solid #1e1e1e;
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scope-icon { color: #6b6b6b; font-size: 16px; }
  .actions {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
  }
  .btn-approve {
    background: oklch(0.74 0.14 150);
    color: #000;
    border-color: oklch(0.74 0.14 150);
  }
  .btn-approve:hover { background: oklch(0.78 0.14 150); }
  .btn-deny {
    background: transparent;
    color: #a3a3a3;
    border-color: #2a2a2a;
  }
  .btn-deny:hover { background: #161616; color: #fafafa; }
  .footer {
    margin-top: 24px;
    text-align: center;
    color: #4a4a4a;
    font-size: 11px;
  }
  .footer a { color: #6b6b6b; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="agent-header">
    <div class="agent-logo">
      {{if .AgentLogoURI}}<img src="{{.AgentLogoURI}}" alt="">{{else}}&#x1F916;{{end}}
    </div>
    <div>
      <div class="agent-name">{{.AgentName}}</div>
      <div class="subtitle">wants to access your account</div>
    </div>
  </div>

  {{if .Resource}}
  <div style="margin-bottom:16px;padding:10px 14px;background:#0d1117;border:1px solid #1e1e1e;border-radius:6px;font-size:12px;color:#6b6b6b;">
    <span style="color:#a3a3a3;font-weight:600;">Resource:</span> {{.Resource}}
  </div>
  {{end}}

  {{if .Scopes}}
  <h2>This will allow {{.AgentName}} to:</h2>
  <ul class="scopes">
    {{range .Scopes}}
    <li><span class="scope-icon">&#x1F511;</span> {{.}}</li>
    {{end}}
  </ul>
  {{end}}

  <form method="POST" action="/oauth/authorize">
    <input type="hidden" name="challenge" value="{{.Challenge}}">
    <input type="hidden" name="client_id" value="{{.ClientID}}">
    <input type="hidden" name="state" value="{{.State}}">
    <div class="actions">
      <button type="submit" name="approved" value="true" class="btn btn-approve">Authorize</button>
      <button type="submit" name="approved" value="false" class="btn btn-deny">Deny</button>
    </div>
  </form>

  <div class="footer">
    Powered by <a href="https://sharkauth.com">SharkAuth</a>
  </div>
</div>
</body>
</html>
