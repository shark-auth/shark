server:
  port: 8080
  secret: "dev-secret-change-me-in-production-min-32-chars!!"
  base_url: "http://localhost:8080"
  cors_origins:
    - "http://localhost:3000"

storage:
  path: "./data/sharkauth.db"

auth:
  session_lifetime: "30d"
  password_min_length: 8

passkeys:
  rp_name: "SharkAuth Dev"
  rp_id: "localhost"
  origin: "http://localhost:8080"
  attestation: "none"
  resident_key: "preferred"
  user_verification: "preferred"

magic_link:
  token_lifetime: "10m"
  redirect_url: "http://localhost:3000/auth/callback"

password_reset:
  redirect_url: "http://localhost:3000/auth/reset-password"

smtp:
  host: "smtp.resend.com"
  port: 465
  username: "resend"
  password: "${RESEND_API_KEY}"
  from: "raul@mail.buildersmty.com.mx"
  from_name: "BuildersMTY"

mfa:
  issuer: "SharkAuth"
  recovery_codes: 10

social:
  redirect_url: ""                         # post-OAuth redirect (empty = JSON response)
  google:
    client_id: ""
    client_secret: ""
    scopes: []                             # defaults: openid, email, profile
  github:
    client_id: ""
    client_secret: ""
    scopes: []                             # defaults: user:email
  apple:
    client_id: ""
    team_id: ""
    key_id: ""
    private_key_path: ""
  discord:
    client_id: ""
    client_secret: ""
    scopes: []                             # defaults: identify, email

sso:
  saml:
    sp_entity_id: "http://localhost:8080"
  oidc: {}

api_keys:
  default_rate_limit: 1000
  key_max_lifetime: "365d"

audit:
  retention: "0"
  cleanup_interval: "1h"

# Admin API keys are now managed via the M2M key system.
# On first run, an admin key is generated and printed to stdout.
# Use: Authorization: Bearer sk_live_...
