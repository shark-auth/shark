name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Core package tests
        run: |
          go test -race -count=1 ./cmd/... ./internal/auth/... ./internal/cache ./internal/storage ./internal/oauth ./internal/vault ./internal/telemetry
      - name: API launch/security tests
        run: |
          go test -race -count=1 ./internal/api ./internal/api/middleware -run 'Test(Auth|Login|Signup|Logout|Password|Session|Admin.*Session|APIKey|RequiresAdminKey|AdminAPIKey|OAuth|Vault|Audit|Telemetry|MFA|JWT|DPoP|Revoke|TokenEndpoint|Agent.*Token|User.*Agent)'
      - name: Build CLI
        run: go build ./cmd/shark

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./cmd/... ./internal/...

  sdk-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter @sharkauth/sdk build
      - name: Typecheck
        run: pnpm --filter @sharkauth/sdk typecheck
      - name: Test
        run: pnpm --filter @sharkauth/sdk test
      - name: Package check
        run: |
          cd sdk/typescript
          npm pack --dry-run
          TARBALL=$(npm pack --silent)
          cd ../..
          mkdir -p /tmp/shark-ts-install
          npm init -y --prefix /tmp/shark-ts-install
          npm install --prefix /tmp/shark-ts-install "./sdk/typescript/${TARBALL}"
          cd /tmp/shark-ts-install
          node --input-type=module -e "import('@sharkauth/sdk').then(() => console.log('ok'))"

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        working-directory: sdk/python
        run: pip install .[dev] build twine
      - name: Test
        working-directory: sdk/python
        run: pytest
      - name: Build wheel + sdist
        working-directory: sdk/python
        run: python -m build
      - name: Check distribution metadata
        working-directory: sdk/python
        run: twine check dist/*
      - name: Install from built wheel
        working-directory: sdk/python
        run: |
          python -m venv /tmp/shark-python-install
          /tmp/shark-python-install/bin/pip install dist/*.whl
          /tmp/shark-python-install/bin/python -c "import shark_auth; print('ok')"

  e2e-smoke-launch:
    needs: [go-launch]
    runs-on: ubuntu-latest
    env:
      SHARKAUTH_SERVER_SECRET: ci-only-secret-used-only-during-smoke-tests-xx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build shark
        run: go build -o shark ./cmd/shark
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install smoke test dependencies
        working-directory: tests/smoke
        run: pip install -r requirements.txt
      - name: Run launch smoke tests
        run: pytest -m launch tests/smoke
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: |
            server.log
            tests/smoke/server.log
            tests/smoke/shark_serve.log
