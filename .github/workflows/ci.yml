name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      SHARKAUTH_SERVER_SECRET: ci-only-secret-used-only-during-smoke-tests-xx
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify (vet + unit + integration + e2e)
        run: make verify

      - name: Build
        run: go build -ldflags="-s -w" -o shark ./cmd/shark

      - name: Smoke test
        run: ./smoke_test.sh

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (SARIF to Security tab)
        run: gosec -fmt=sarif -out=gosec.sarif ./...
        continue-on-error: true

      - name: Upload gosec SARIF
        if: hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

      - name: Run gosec (blocking)
        run: gosec -quiet ./...

      # govulncheck runs last and is advisory-only. Vulnerability databases
      # are rolling and a new CVE on any transitive dep shouldn't block a
      # merge to main; findings show up in the job log and annotations so
      # they stay visible.
      - name: govulncheck (advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
