name: Publish Python SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Python SDK version to publish, for example 0.1.0
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify tag matches pyproject version
        shell: bash
        run: |
          TAG_VERSION="${{ inputs.version }}"
          PROJECT_VERSION="$(python - <<'PY'
import tomllib
with open("pyproject.toml", "rb") as f:
    print(tomllib.load(f)["project"]["version"])
PY
)"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match pyproject.toml version $PROJECT_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: pip install .[dev] build twine

      - name: Run tests
        run: pytest

      - name: Build wheel + sdist
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Verify post-publish availability
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          echo "Verifying shark-auth==${VERSION} on PyPI…"
          for i in 1 2 3; do
            if pip install --index-url https://pypi.org/simple/ "shark-auth==${VERSION}" --dry-run 2>&1 | grep -q "Would install"; then
              echo "shark-auth==${VERSION} available on PyPI."
              exit 0
            fi
            echo "Attempt ${i}/3 failed — sleeping 30s…"
            sleep 30
          done
          echo "ERROR: shark-auth==${VERSION} not yet visible on PyPI after 3 attempts."
          exit 1
