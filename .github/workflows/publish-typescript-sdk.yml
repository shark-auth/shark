name: Publish TypeScript SDK

on:
  push:
    tags:
      - 'ts-sdk-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ts-sdk-v}"
          PACKAGE_VERSION="$(node -p "require('./sdk/typescript/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match sdk/typescript/package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @sharkauth/sdk build

      - name: Typecheck
        run: pnpm --filter @sharkauth/sdk typecheck

      - name: Test
        run: pnpm --filter @sharkauth/sdk test

      - name: Package dry run
        working-directory: sdk/typescript
        run: npm pack --dry-run

      - name: Publish to npm
        run: pnpm --filter @sharkauth/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify post-publish availability
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#ts-sdk-v}"
          echo "Verifying @sharkauth/sdk@${VERSION} on npm…"
          for i in 1 2 3; do
            if npm view "@sharkauth/sdk@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
              echo "@sharkauth/sdk@${VERSION} available on npm."
              exit 0
            fi
            echo "Attempt ${i}/3 failed — sleeping 30s…"
            sleep 30
          done
          echo "ERROR: @sharkauth/sdk@${VERSION} not yet visible on npm after 3 attempts."
          exit 1
