          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createAuthFlow
      summary: Create auth flow
      tags: [flows]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, steps]
              properties:
                name:
                  type: string
                steps:
                  type: array
                  items:
                    type: object
                active:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Flow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthFlow'

  /api/v1/admin/flows/{id}:
    get:
      operationId: getAuthFlow
      summary: Get auth flow
      tags: [flows]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Auth flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthFlow'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateAuthFlow
      summary: Update auth flow
      tags: [flows]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                steps:
                  type: array
                  items:
                    type: object
                active:
                  type: boolean
      responses:
        '200':
          description: Updated flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthFlow'
    delete:
      operationId: deleteAuthFlow
      summary: Delete auth flow
      tags: [flows]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /api/v1/admin/flows/{id}/test:
    post:
      operationId: runAuthFlow
      summary: Test / run auth flow
      description: Dry-run an auth flow with a test payload. Returns step-by-step execution trace.
      tags: [flows]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Test input payload â€” shape depends on flow steps.
      responses:
        '200':
          description: Flow execution trace
          content:
            application/json:
              example:
                flow_id: flow_01HZ2XK
                status: passed
                steps:
                  - step: email_verified
                    result: pass
                  - step: mfa_challenge
                    result: skip
                    reason: mfa_not_enrolled
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

