  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # AUDIT LOGS
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /api/v1/audit-logs:
    get:
      operationId: listAuditLogs
      summary: List audit log entries
      description: |
        Cursor-paginated audit log. Supports rich filtering: action, actor,
        target, resource type, status, IP, date range.
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          schema:
            type: string
            example: agent.token_issued
        - name: actor_id
          in: query
          schema:
            type: string
        - name: actor_type
          in: query
          schema:
            type: string
            enum: [user, agent, admin, system]
        - name: target_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failure, blocked]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/audit-logs/export:
    post:
      operationId: exportAuditLogs
      summary: Export audit logs as CSV
      description: |
        Streams a CSV of audit log entries for the given time range.
        **Note: audit export is a v0.2 (W18-W19) feature â€” available in current build
        but not prominently surfaced in the v0.1 launch UI.**
      tags: [audit]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
                action:
                  type: string
      responses:
        '200':
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string
        '400':
          description: Invalid date range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # VAULT
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /api/v1/vault/providers:
    get:
      operationId: listVaultProviders
      summary: List vault providers
      description: List configured third-party OAuth provider templates (Google, GitHub, Slack, etc.).
      tags: [vault]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VaultProvider'
    post:
      operationId: createVaultProvider
      summary: Create vault provider
      tags: [vault]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, client_id, client_secret, scopes]
              properties:
                name:
                  type: string
                  example: google
                display_name:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Provider created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultProvider'

  /api/v1/vault/connections:
    get:
      operationId: listVaultConnections
      summary: List user vault connections
      description: Lists OAuth connections the current user has granted (session auth).
      tags: [vault]
      security:
        - oauth2:
            - openid
      responses:
        '200':
          description: Connection list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VaultConnection'

  /api/v1/vault/connections/{id}:
    delete:
      operationId: deleteVaultConnection
      summary: Disconnect vault connection
      description: Revoke a user's third-party OAuth connection and delete stored tokens.
      tags: [vault]
      security:
        - oauth2:
            - openid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Disconnected
        '404':
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vault/{provider}/token:
    get:
      operationId: getVaultToken
      summary: Retrieve fresh vault token (agent)
      description: |
        Called by an agent acting on behalf of a user (OAuth bearer, user-bound token).
        Returns a fresh access token for the specified provider, auto-refreshing
        if the stored token has expired. The agent never sees the underlying
        refresh token.
      tags: [vault]
      security:
        - oauth2:
            - openid
        - dpopBound: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            example: google
      responses:
        '200':
          description: Fresh provider token
          content:
            application/json:
              example:
                provider: google
                access_token: ya29.a0AfB_...
                scopes: ["https://www.googleapis.com/auth/gmail.readonly"]
                expires_at: '2026-04-26T13:00:00Z'
        '404':
          description: No connection for this user + provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vault/connect/{provider}:
    get:
      operationId: vaultConnectStart
      summary: Start vault OAuth connect flow
      description: Initiates the OAuth connect flow for a provider. Redirects to provider authorization URL.
      tags: [vault]
      security:
        - oauth2:
            - openid
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to provider

