  # USERS
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /api/v1/users:
    get:
      operationId: listUsers
      summary: List users
      description: Paginated list of all users. Supports filtering by email, verification status.
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
        - name: count
          in: query
          schema:
            type: integer
          description: Return only count (used for auto-checkoff polling)
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  next_cursor:
                    type: string
                    nullable: true
                  has_more:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createUser
      summary: Create user
      description: Create a new user (admin path, bypasses email verification flow).
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                password:
                  type: string
                  description: If omitted, user must set password via magic link / reset flow.
                send_verification:
                  type: boolean
                  default: true
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/users/{id}:
    get:
      operationId: getUser
      summary: Get user
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateUser
      summary: Update user
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteUser
      summary: Delete user
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/users/{id}/sessions:
    delete:
      operationId: revokeUserSessions
      summary: Revoke all sessions for a user
      description: Forcibly terminates all active sessions for the specified user.
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sessions revoked
          content:
            application/json:
              example:
                revoked: 3
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # AGENTS
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /api/v1/agents:
    get:
      operationId: listAgents
      summary: List agents
      description: List all registered agents (DCR clients). Supports pagination.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
        - name: count
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
                  next_cursor:
                    type: string
                    nullable: true
                  has_more:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createAgent
      summary: Register agent (admin path)
      description: |
        Register a new agent via the admin API (admin key required).
        For the unauthenticated RFC 7591 path, use `POST /oauth/register`.
      tags: [agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateAgent
      summary: Update agent
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_name:
                  type: string
                scope:
                  type: string
                active:
                  type: boolean
      responses:
        '200':
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteAgent
      summary: Deactivate / delete agent
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{id}/rotate-secret:
    post:
      operationId: rotateAgentSecret
      summary: Rotate agent client secret
      description: |
        Generate a new `client_secret` for the agent. The old secret is
        immediately invalidated. Returns the new secret â€” shown once.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New secret
          content:
            application/json:
              example:
                client_id: shark_dcr_abc123
                client_secret: cs_live_newSecret...
                rotated_at: '2026-04-26T12:00:00Z'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{id}/rotate-dpop-key:
    post:
      operationId: rotateAgentDPoPKey
      summary: Rotate agent DPoP public key
      description: |
        Replace the agent's registered DPoP public key (JWK). After rotation, the
        agent must sign new proofs with the new private key. Existing tokens bound
        to the old key will be invalidated at next introspection.
      tags: [agents]
      security:
        - bearerAuth: []
      x-source: internal/api/agent_handlers.go (handleRotateAgentDPoPKey)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jwk]
              properties:
                jwk:
                  type: object
                  description: New JWK (public key, EC P-256 or Ed25519).
                  example:
                    kty: EC
                    crv: P-256
                    x: base64url-x
                    y: base64url-y
      responses:
        '200':
          description: DPoP key rotated
          content:
            application/json:
              example:
                agent_id: agt_01HZ2XKABCDEF
                jkt: thumbprint-of-new-key
                rotated_at: '2026-04-26T12:00:00Z'
        '400':
          description: Invalid JWK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{id}/tokens/revoke-all:
    post:
      operationId: revokeAgentTokens
      summary: Revoke all tokens for an agent
      description: Immediately revokes all active access tokens and refresh tokens issued to this agent.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tokens revoked
          content:
            application/json:
              example:
                revoked: 5
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/agents/{id}/policies:
    get:
      operationId: getAgentPolicies
      summary: Get agent policies
      description: |
        Returns the policy envelope for this agent: allowed scopes, token TTL,
        DPoP requirement, allowed grant types. Policies are enforced at token
        issuance time â€” violations return `invalid_scope` or `unauthorized_client`.
      tags: [agents]
      security:
        - bearerAuth: []
      x-source: internal/api/agent_policies_handlers.go (handleGetAgentPolicies)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPolicies'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: setAgentPolicies
      summary: Set agent policies
      description: |
        Replace the full policy envelope for an agent. This is an upsert â€”
        if no policy row exists yet, one is created.
      tags: [agents]
      security:
        - bearerAuth: []
      x-source: internal/api/agent_policies_handlers.go (handlePostAgentPolicies)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPolicies'
            example:
              allowed_scopes: ["openid", "billing:read"]
              max_token_ttl_seconds: 1800
              require_dpop: true
              allowed_grant_types: ["client_credentials"]
      responses:
        '200':
          description: Policies saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPolicies'
        '400':
          description: Invalid policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

