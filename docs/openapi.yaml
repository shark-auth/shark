  /api/v1/admin/flows:
    get:
      operationId: listAuthFlows
      summary: List auth flows
      tags: [flows]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Flow list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuthFlow'
