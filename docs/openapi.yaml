  # ADMIN â€” BOOTSTRAP + SETUP
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /admin/bootstrap/consume:
    post:
      operationId: bootstrapConsume
      summary: Consume bootstrap token
      description: |
        Single-use bootstrap token consume. The token is the one-time credential
        printed at first boot (stored at `data/admin.key.firstboot`). Exchanges it
        for the permanent admin API key. No auth middleware â€” the token IS the credential.
      tags: [admin]
      security: []
      x-source: internal/api/admin_bootstrap_handlers.go
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  example: sk_boot_...
      responses:
        '200':
          description: Admin key issued
          content:
            application/json:
              example:
                admin_key: sk_live_...
                message: Bootstrap complete. Store the admin key â€” it will not be shown again.
        '400':
          description: Token already consumed or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/health:
    get:
      operationId: adminHealth
      summary: Admin health (extended)
      description: Extended health check with DB stats, migration version, and feature flags.
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Admin health payload
          content:
            application/json:
              example:
                status: ok
                db: ok
                migrations: 23
                dev_mode: true
        '401':
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/config:
    get:
      operationId: getAdminConfig
      summary: Get server configuration
      description: Returns current runtime configuration (sanitised â€” secrets redacted).
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Config object
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateAdminConfig
      summary: Update server configuration
      description: Patch runtime configuration. Changes take effect immediately without restart.
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial config object â€” only provided keys are updated.
      responses:
        '200':
          description: Updated config
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid config patch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/dev/emails:
    get:
      operationId: listDevEmails
      summary: List dev-mode captured emails
      description: |
        Available only when `dev_mode=true`. Lists emails captured by the built-in
        dev inbox (no SMTP server required in dev mode).
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of captured emails
          content:
            application/json:
              schema:
                type: object
