openapi: 3.1.0
info:
  title: SharkAuth API
  version: 0.9.0
  summary: Open-source OAuth 2.1 authorization server with native agent delegation.
  description: |
    SharkAuth is a single-binary, open-source authentication platform purpose-built
    for the agent era. It ships every primitive a modern auth product needs â€”
    SSO (SAML + OIDC), passkeys (WebAuthn), TOTP MFA, magic links, social login,
    organizations + RBAC, audit log, webhooks, reverse-proxy mode â€” plus
    native RFC 8693 token-exchange with full agent delegation chains.

    ### Authentication

    Most admin endpoints require an admin API key (`sk_live_...`) as a Bearer token.
    OAuth endpoints follow RFC 6749 + RFC 7591 + RFC 9449 client authentication rules.
    Agent endpoints accept DPoP-bound access tokens issued by the token endpoint.

    ### Errors

    Two error envelopes coexist by surface:

    1. **OAuth surface** (`/oauth/*`) â€” RFC 6749 Â§5.2 shape:
       `{error, error_description, error_uri}`.
    2. **Admin + Platform surfaces** â€” extended shape:
       `{error, code, message, docs_url, details}`.

    ### API Reference UI

    Interactive docs available at `/api/docs` (Scalar UI).

  contact:
    name: SharkAuth
    url: https://github.com/shark-auth/shark
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local dev server (`shark serve --dev`)
  - url: https://auth.yourdomain.com
    description: Self-hosted production instance

tags:
  - name: oauth
    description: OAuth 2.1 Authorization Server â€” token issuance, DCR, introspection, revocation, token exchange.
  - name: agents
    description: Agent (machine-to-machine OAuth client) lifecycle â€” register, rotate secrets/DPoP keys, policies, token revocation.
  - name: users
    description: Human user management â€” CRUD, session/token revocation.
  - name: applications
    description: OAuth application management â€” CRUD, secret rotation.
  - name: audit
    description: Audit log â€” query and CSV export.
  - name: vault
    description: Token Vault â€” third-party OAuth credential storage and agent-side retrieval.
  - name: flows
    description: Auth Flow Builder â€” CRUD and test execution for custom auth flows.
  - name: admin
    description: Admin operations â€” health, config, bootstrap, dev-email.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: AdminAPIKey
      description: |
        Admin API key â€” issued at first boot and stored at `data/admin.key.firstboot`.
        Format: `sk_live_<random>`. Pass as `Authorization: Bearer sk_live_...`.
    oauth2:
      type: oauth2
      description: |
        OAuth 2.1 access token issued to a DCR-registered client (agent).
        Supports `client_credentials` and `urn:ietf:params:oauth:grant-type:token-exchange`.
      flows:
        clientCredentials:
          tokenUrl: /oauth/token
          scopes:
            openid: OpenID Connect ID token
            profile: User profile claims
            email: User email claim
            offline_access: Refresh token
    dpopBound:
      type: apiKey
      in: header
      name: DPoP
      description: |
        RFC 9449 DPoP proof JWT. Required alongside `Authorization: DPoP <token>` when
        the access token was issued with DPoP binding (`cnf.jkt` claim present).

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: invalid_request
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: The request body is missing required fields.
        docs_url:
          type: string
          format: uri
      required: [error, message]

    OAuthError:
      type: object
      properties:
        error:
          type: string
          example: invalid_client
        error_description:
          type: string
          example: Client authentication failed.
        error_uri:
          type: string
          format: uri
      required: [error]

    Agent:
      type: object
      properties:
        id:
          type: string
          example: agt_01HZ2XKABCDEF
        client_id:
          type: string
          example: shark_dcr_abc123
        client_name:
          type: string
          example: my-billing-agent
        grant_types:
          type: array
          items:
            type: string
          example: ["client_credentials", "urn:ietf:params:oauth:grant-type:token-exchange"]
        scope:
          type: string
          example: openid billing:read
        token_endpoint_auth_method:
          type: string
          enum: [client_secret_basic, client_secret_post, private_key_jwt, none]
        active:
          type: boolean
        dpop_bound:
          type: boolean
          description: Whether this agent has a registered DPoP public key.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentCreateRequest:
      type: object
      required: [client_name]
      properties:
        client_name:
          type: string
          example: billing-agent
        grant_types:
          type: array
          items:
            type: string
          default: ["client_credentials"]
        scope:
          type: string
          example: openid billing:read
        token_endpoint_auth_method:
          type: string
          default: client_secret_basic

    AgentPolicies:
      type: object
      properties:
        allowed_scopes:
          type: array
          items:
            type: string
          example: ["billing:read", "openid"]
        max_token_ttl_seconds:
          type: integer
          example: 3600
        require_dpop:
          type: boolean
          description: Reject token requests from this agent unless a DPoP proof is present.
        allowed_grant_types:
          type: array
          items:
            type: string

    User:
      type: object
      properties:
        id:
          type: string
          example: usr_01HZ2XK123456
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Smith
        email_verified:
          type: boolean
        mfa_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    Application:
      type: object
      properties:
        id:
          type: string
          example: app_01HZ2XK789ABC
        client_id:
          type: string
          example: shark_app_xyz789
        name:
          type: string
          example: My Web App
        integration_mode:
          type: string
          enum: [components, api, pkce]
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
          example: agent.token_issued
        actor_id:
          type: string
        actor_type:
          type: string
          enum: [user, agent, admin, system]
        target_id:
          type: string
        resource_type:
          type: string
        status:
          type: string
          enum: [success, failure, blocked]
        ip:
          type: string
        created_at:
          type: string
          format: date-time

    AuditLogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean

    VaultProvider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: google
        display_name:
          type: string
          example: Google
        scopes:
          type: array
          items:
            type: string
        active:
          type: boolean

    VaultConnection:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
          example: google
        user_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    AuthFlow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: email-mfa-required
        steps:
          type: array
          items:
            type: object
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: DPoP
        expires_in:
          type: integer
          example: 3600
        scope:
          type: string
        id_token:
          type: string
          description: Present when `openid` scope was requested.
        refresh_token:
          type: string
          description: Present when `offline_access` scope was requested.

    DCRRequest:
      type: object
      required: [client_name]
      properties:
        client_name:
          type: string
          example: my-mcp-agent
        grant_types:
          type: array
          items:
            type: string
          example: ["client_credentials", "urn:ietf:params:oauth:grant-type:token-exchange"]
        token_endpoint_auth_method:
          type: string
          default: client_secret_basic
        scope:
          type: string
          example: openid
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
        jwks_uri:
          type: string
          format: uri
          description: URI of the client's JWKS (for `private_key_jwt` auth).

    DCRResponse:
      allOf:
        - $ref: '#/components/schemas/DCRRequest'
        - type: object
          properties:
            client_id:
              type: string
              example: shark_dcr_a1b2c3d4
            client_secret:
              type: string
              description: Shown once â€” store immediately.
            registration_access_token:
              type: string
              description: Bearer for RFC 7592 management endpoints.
            registration_client_uri:
              type: string
              format: uri
            client_id_issued_at:
              type: integer
            client_secret_expires_at:
              type: integer
              description: "0 = never expires."

paths:

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # WELL-KNOWN / DISCOVERY
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /.well-known/oauth-authorization-server:
    get:
      operationId: getOAuthServerMetadata
      summary: OAuth 2.0 Authorization Server Metadata
      description: |
        RFC 8414 Authorization Server Metadata. MCP clients use this as their
        discovery entrypoint. Returns issuer, endpoints, supported grant types,
        DPoP algorithms, etc.
      tags: [oauth]
      security: []
      responses:
        '200':
          description: Authorization server metadata
          content:
            application/json:
              example:
                issuer: http://localhost:8080
                authorization_endpoint: http://localhost:8080/oauth/authorize
                token_endpoint: http://localhost:8080/oauth/token
                jwks_uri: http://localhost:8080/.well-known/jwks.json
                registration_endpoint: http://localhost:8080/oauth/register
                userinfo_endpoint: http://localhost:8080/oauth/userinfo
                revocation_endpoint: http://localhost:8080/oauth/revoke
                introspection_endpoint: http://localhost:8080/oauth/introspect
                # device_authorization_endpoint omitted â€” device flow disabled for v0.1
                grant_types_supported:
                  - authorization_code
                  - client_credentials
                  - urn:ietf:params:oauth:grant-type:token-exchange
                  - refresh_token
                dpop_signing_alg_values_supported:
                  - ES256
                token_endpoint_auth_methods_supported:
                  - client_secret_basic
                  - client_secret_post
                  - private_key_jwt
                  - none

  /.well-known/openid-configuration:
    get:
      operationId: getOIDCConfiguration
      summary: OpenID Connect Discovery Document
      description: OIDC Discovery document (RFC 8414 + OpenID Connect Discovery 1.0).
      tags: [oauth]
      security: []
      responses:
        '200':
          description: OIDC configuration
          content:
            application/json:
              schema:
                type: object

  /.well-known/jwks.json:
    get:
      operationId: getJWKS
      summary: JSON Web Key Set
      description: |
        RFC 7517 JWKS. Returns the active signing keys. Resource servers use this
        to verify JWT access tokens locally without an introspection round-trip.
      tags: [oauth]
      security: []
      responses:
        '200':
          description: JWKS
          content:
            application/json:
              example:
                keys:
                  - kty: EC
                    crv: P-256
                    kid: key-2026-04-26
                    use: sig
                    alg: ES256
                    x: base64url-encoded-x
                    y: base64url-encoded-y

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # OAUTH 2.1 ENDPOINTS
  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

  /oauth/register:
    post:
      operationId: dcrRegisterClient
      summary: Dynamic Client Registration (RFC 7591)
      description: |
        Register a new OAuth 2.1 client (agent). No authentication required â€” the
        returned `registration_access_token` gates subsequent RFC 7592 management
        operations. This is the canonical agent-native registration path.
      tags: [oauth]
      security: []
      x-source: internal/oauth/dcr.go
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DCRRequest'
            example:
              client_name: my-mcp-agent
              grant_types:
                - client_credentials
                - urn:ietf:params:oauth:grant-type:token-exchange
              token_endpoint_auth_method: client_secret_basic
              scope: openid billing:read
      responses:
        '201':
          description: Client registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DCRResponse'
        '400':
          description: Invalid registration request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/register/{client_id}:
    get:
      operationId: dcrGetClient
      summary: Get registered client (RFC 7592)
      tags: [oauth]
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DCRResponse'
        '401':
          description: Invalid or missing registration_access_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
    put:
      operationId: dcrUpdateClient
      summary: Update registered client (RFC 7592)
      tags: [oauth]
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DCRRequest'
      responses:
        '200':
          description: Updated client metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DCRResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
    delete:
      operationId: dcrDeleteClient
      summary: Delete registered client (RFC 7592)
      tags: [oauth]
      security:
        - bearerAuth: []
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Client deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/token:
    post:
      operationId: issueToken
      summary: Token Endpoint
      description: |
        RFC 6749 / RFC 8693 token endpoint. Supported grant types:
        - `client_credentials` â€” M2M tokens for agents
        - `authorization_code` â€” Authorization Code + PKCE
        - `refresh_token` â€” Refresh an access token
        - `urn:ietf:params:oauth:grant-type:token-exchange` â€” RFC 8693 delegation
        - ~~`urn:ietf:params:oauth:grant-type:device_code`~~ â€” **Coming v0.2** (returns `unsupported_grant_type`)

        Attach a `DPoP:` proof header for RFC 9449 DPoP-bound tokens.
        The issued token will contain a `cnf.jkt` claim.
      tags: [oauth]
      security: []
      x-source: internal/oauth/token.go
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  example: client_credentials
                scope:
                  type: string
                  example: openid billing:read
                client_id:
                  type: string
                client_secret:
                  type: string
                code:
                  type: string
                  description: Authorization code (authorization_code grant)
                code_verifier:
                  type: string
                  description: PKCE code verifier
                refresh_token:
                  type: string
                subject_token:
                  type: string
                  description: Token to exchange (token-exchange grant)
                subject_token_type:
                  type: string
                  example: urn:ietf:params:oauth:token-type:access_token
                audience:
                  type: string
                  description: Intended audience for exchanged token (token-exchange)
                device_code:
                  type: string
                  description: Device code (device_code grant)
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Token error (invalid_grant, invalid_client, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '401':
          description: Client authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/authorize:
    get:
      operationId: authorizeGet
      summary: Authorization Endpoint (GET)
      description: RFC 6749 Authorization Endpoint. Renders the consent/login page.
      tags: [oauth]
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            example: code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            example: S256
      responses:
        '200':
          description: Authorization/consent page HTML
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to client with code or error
        '400':
          description: Invalid authorization request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/revoke:
    post:
      operationId: revokeToken
      summary: Token Revocation (RFC 7009)
      description: Revoke an access token or refresh token.
      tags: [oauth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
      responses:
        '200':
          description: Token revoked (or not found â€” always 200 per RFC 7009)

  /oauth/introspect:
    post:
      operationId: introspectToken
      summary: Token Introspection (RFC 7662)
      description: |
        Introspect an access token. Requires client authentication
        (`Authorization: Basic <base64(client_id:client_secret)>`).
      tags: [oauth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
      responses:
        '200':
          description: Introspection response
          content:
            application/json:
              example:
                active: true
                sub: shark_dcr_abc123
                iss: http://localhost:8080
                exp: 1714089600
                scope: openid billing:read
                client_id: shark_dcr_abc123
                token_type: Bearer
        '401':
          description: Client authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/userinfo:
    get:
      operationId: getUserInfo
      summary: UserInfo Endpoint (OIDC)
      description: Returns claims about the authenticated end-user. Requires a valid access token with `openid` scope.
      tags: [oauth]
      security:
        - oauth2:
            - openid
      responses:
        '200':
          description: UserInfo claims
          content:
            application/json:
              example:
                sub: usr_01HZ2XK123456
                email: alice@example.com
                name: Alice Smith
                email_verified: true
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/device:
    post:
      operationId: deviceAuthorizationRequest
      summary: Device Authorization Request (RFC 8628) â€” Coming v0.2
      description: |
        **Disabled for v0.1.** Device Authorization Grant (RFC 8628) is not yet
        supported. This endpoint returns `501 Not Implemented` with
        `{"error":"not_implemented"}`. Planned for v0.2.
      tags: [oauth]
      security: []
      deprecated: true
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
                scope:
                  type: string
      responses:
        '501':
          description: Not Implemented â€” device flow coming v0.2
          content:
            application/json:
              example:
                error: not_implemented
                error_description: Device authorization grant (RFC 8628) is not yet supported. Coming in v0.2.

